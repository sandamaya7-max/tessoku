<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>内科レジデントの鉄則 問題集</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --teal:#00818A;--teal-l:#E0F4F5;--teal-b:#5EC0C5;
  --red:#E24B4A;--red-l:#FCEBEB;--red-b:#F09595;
  --green:#1D9E75;--green-l:#EAF3DE;--green-b:#97C459;--green-d:#27500A;
  --amber:#BA7517;--amber-l:#FAEEDA;--amber-b:#EF9F27;
  --orange:#D85A30;--orange-l:#FAECE7;
  --bg:#F4F9F9;--surface:#fff;--surface2:#EAF4F4;
  --border:rgba(0,0,0,.10);--border-s:rgba(0,0,0,.18);
  --text:#1A1917;--muted:#5A6A6A;--hint:#9AADAD;
  --r:12px;--rs:8px;
}
html{background:var(--bg)}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6}
.app-header{position:sticky;top:0;z-index:100;background:rgba(244,249,249,.93);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:.5px solid var(--border);padding:11px 16px;display:flex;align-items:center;gap:10px}
.tl-badge{background:var(--teal);color:#fff;font-size:11px;font-weight:700;padding:3px 9px;border-radius:5px;letter-spacing:.05em;font-family:'IBM Plex Mono',monospace}
.header-title{font-size:13px;color:var(--muted);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-score{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted);white-space:nowrap}
.progress-wrap{height:3px;background:var(--surface2)}
.progress-fill{height:100%;background:var(--teal);transition:width .5s cubic-bezier(.4,0,.2,1);width:0%}

/* HOME */
#home{padding:20px 16px 60px;max-width:520px;margin:0 auto}
.home-hero{text-align:center;padding:20px 0 16px}
.home-hero h1{font-size:20px;font-weight:700;margin-bottom:6px;line-height:1.4}
.book-tag{display:inline-block;background:var(--teal-l);border:1px solid var(--teal-b);color:var(--teal);font-size:12px;padding:4px 14px;border-radius:20px;margin-top:8px;margin-bottom:4px}
.home-hero p{font-size:13px;color:var(--muted);line-height:1.7}
.home-tabs{display:flex;gap:5px;margin:14px 0 4px;background:var(--surface2);padding:4px;border-radius:var(--r)}
.tab-btn{flex:1;padding:7px 4px;border:none;border-radius:var(--rs);background:transparent;font-size:12px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;color:var(--muted);transition:all .2s}
.tab-btn.active{background:var(--surface);color:var(--text);font-weight:500;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.progress-summary{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:14px}
.prog-ring{position:relative;width:54px;height:54px;flex-shrink:0}
.prog-ring svg{width:54px;height:54px;transform:rotate(-90deg)}
.prog-ring circle{fill:none;stroke-width:5}
.prog-track{stroke:var(--surface2)}
.prog-fill-c{stroke:var(--teal);stroke-linecap:round;transition:stroke-dashoffset .8s ease}
.prog-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:13px;font-weight:700;font-family:'IBM Plex Mono',monospace}
.prog-text h3{font-size:14px;font-weight:500}
.prog-text p{font-size:12px;color:var(--muted)}
.review-banner{background:linear-gradient(135deg,#005A62,#00818A);border-radius:var(--r);padding:13px 15px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:11px}
.review-banner:active{opacity:.9}
.review-icon{font-size:22px}
.review-text h3{font-size:14px;font-weight:700;color:#fff}
.review-text p{font-size:12px;color:rgba(255,255,255,.75);margin-top:1px}
.review-count{background:rgba(255,255,255,.2);color:#fff;font-size:12px;font-family:'IBM Plex Mono',monospace;padding:3px 9px;border-radius:20px;margin-left:auto;white-space:nowrap}
.section-head{font-size:11px;font-weight:700;color:var(--hint);letter-spacing:.07em;margin:14px 0 8px;font-family:'IBM Plex Mono',monospace}
.scenario-list{display:flex;flex-direction:column;gap:7px}
.scenario-card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:12px 14px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:11px;-webkit-appearance:none;width:100%;text-align:left}
.scenario-card:active{transform:scale(.98);background:var(--surface2)}
.scenario-card.done{border-color:var(--teal-b);background:var(--teal-l)}
.scenario-card.has-review{border-color:var(--amber-b)}
.sc-icon{width:36px;height:36px;min-width:36px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:17px;background:var(--surface2)}
.scenario-card.done .sc-icon{background:#A8DFDE}
.sc-body{flex:1;min-width:0}
.sc-title{font-size:13px;font-weight:500}
.sc-meta{font-size:11px;color:var(--muted);margin-top:1px}
.sc-tags{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.sc-badge{font-size:10px;font-family:'IBM Plex Mono',monospace;padding:2px 6px;border-radius:4px;background:var(--surface2);color:var(--muted)}
.scenario-card.done .sc-badge{background:#A8DFDE;color:#004A50}
.diff-1{background:#E6F1FB;color:#185FA5}
.diff-2{background:var(--amber-l);color:var(--amber)}
.diff-3{background:var(--red-l);color:var(--red)}
.sc-arrow{color:var(--hint);font-size:16px;flex-shrink:0}
.part-divider{background:var(--teal);color:#fff;border-radius:var(--rs);padding:8px 14px;margin-top:16px;margin-bottom:8px;font-size:12px;font-weight:700}

/* SIM */
#sim{display:none;max-width:520px;margin:0 auto}
.sim-main{padding:20px 16px 48px}
.screen{display:none}
.screen.active{display:block;animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.step-indicator{display:flex;align-items:center;gap:5px;margin-bottom:16px}
.step-dot{width:6px;height:6px;border-radius:50%;background:var(--border-s);transition:all .3s}
.step-dot.done{background:var(--green)}
.step-dot.cur{background:var(--teal);width:20px;border-radius:3px}
.step-lbl{font-size:11px;color:var(--hint);margin-left:4px;font-family:'IBM Plex Mono',monospace}

/* Patient card */
.case-card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:11px}
.case-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.case-title{font-size:16px;font-weight:700}
.case-meta{font-size:12px;color:var(--muted);margin-top:2px}
.case-tag{font-size:11px;background:var(--teal-l);color:var(--teal);padding:3px 8px;border-radius:5px;font-family:'IBM Plex Mono',monospace;white-space:nowrap}
.tessoku-box{background:var(--teal-l);border-left:3px solid var(--teal);border-radius:0 var(--rs) var(--rs) 0;padding:11px 14px;margin-bottom:11px;font-size:13px;line-height:1.8}
.tessoku-box::before{content:'鉄則';display:block;font-size:10px;font-weight:700;color:var(--teal);letter-spacing:.06em;margin-bottom:4px;font-family:'IBM Plex Mono',monospace}
.case-body{font-size:13px;line-height:1.8;margin-bottom:11px}
.cc{background:var(--orange-l);border-left:3px solid var(--orange);border-radius:0 var(--rs) var(--rs) 0;padding:10px 13px;margin-bottom:11px;font-size:13px;color:#4A1B0C;line-height:1.7}
.cc::before{content:'症例';display:block;font-size:10px;font-weight:700;color:var(--orange);letter-spacing:.06em;margin-bottom:3px;font-family:'IBM Plex Mono',monospace}
.info-card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:11px;font-size:13px;line-height:1.9}
.card-lbl{font-size:10px;font-weight:700;color:var(--hint);letter-spacing:.08em;margin-bottom:6px;font-family:'IBM Plex Mono',monospace}
.positive{color:var(--red);font-weight:500}
.drug-box{background:#0C1A2E;border-radius:var(--rs);padding:11px 13px;margin:9px 0;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#7EC8E3;line-height:1.9}
.drug-box .dt{color:#A8D8F0;font-weight:500;margin-bottom:5px;font-size:11px;letter-spacing:.05em}
.drug-box .di{color:#C8EAF8}
.drug-box .dw{color:#F7C948;font-size:11px;margin-top:3px}
.drug-box .dn{color:#6B8F9E;font-size:11px;margin-top:2px}
.info-note{background:var(--teal-l);border:.5px solid var(--teal-b);border-radius:var(--rs);padding:10px 13px;margin-bottom:11px;font-size:13px;line-height:1.7;color:#003A40}
.info-note .card-lbl{color:var(--teal)}
.sec-lbl{font-size:13px;font-weight:700;margin:16px 0 9px;padding-left:9px;border-left:3px solid var(--teal)}
.multi-hint{font-size:12px;color:var(--hint);margin-bottom:8px}
.choices{display:flex;flex-direction:column;gap:6px}
.choice-btn{background:var(--surface);border:.5px solid var(--border);border-radius:var(--rs);padding:11px 12px;text-align:left;font-size:13px;cursor:pointer;width:100%;color:var(--text);font-family:'Noto Sans JP',sans-serif;transition:all .15s;display:flex;align-items:flex-start;gap:9px;-webkit-appearance:none}
.choice-btn:active{transform:scale(.98)}
.choice-letter{width:24px;height:24px;min-width:24px;border-radius:50%;border:1.5px solid var(--border-s);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:var(--muted);transition:all .15s;flex-shrink:0;margin-top:1px}
.choice-btn.sel .choice-letter{background:#1A1917;border-color:#1A1917;color:#fff}
.choice-btn.correct{background:var(--green-l);border-color:var(--green-b)}
.choice-btn.correct .choice-letter{background:var(--green);border-color:var(--green);color:#fff}
.choice-btn.wrong{background:var(--red-l);border-color:var(--red-b)}
.choice-btn.wrong .choice-letter{background:var(--red);border-color:var(--red);color:#fff}
.choice-btn.reveal{background:var(--green-l);border-color:var(--green-b)}
.choice-btn.reveal .choice-letter{background:var(--green);border-color:var(--green);color:#fff}
.choice-btn:disabled{cursor:default}
.submit-btn{width:100%;margin-top:10px;background:var(--teal);color:#fff;border:none;border-radius:var(--rs);padding:13px;font-size:14px;font-weight:500;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:opacity .15s,transform .1s}
.submit-btn:active{transform:scale(.98);opacity:.85}
.submit-btn:disabled{background:var(--border-s);cursor:default}
.feedback{border-radius:var(--rs);padding:12px;margin-top:10px;font-size:13px;line-height:1.8;display:none}
.feedback.correct{background:var(--green-l);border:.5px solid var(--green-b)}
.feedback.partial{background:var(--amber-l);border:.5px solid var(--amber-b)}
.feedback.wrong{background:var(--red-l);border:.5px solid var(--red-b)}
.fb-badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;margin-bottom:6px;font-family:'IBM Plex Mono',monospace}
.feedback.correct .fb-badge{background:var(--green);color:#fff}
.feedback.partial .fb-badge{background:var(--amber);color:#fff}
.feedback.wrong .fb-badge{background:var(--red);color:#fff}
.unsure-btn{width:100%;margin-top:6px;background:transparent;border:.5px solid var(--border-s);border-radius:var(--rs);padding:8px;font-size:12px;cursor:pointer;color:var(--muted);font-family:'Noto Sans JP',sans-serif;display:none}
.unsure-btn.active{background:var(--amber-l);border-color:var(--amber-b);color:var(--amber)}
.next-btn{width:100%;margin-top:10px;background:var(--surface);border:1.5px solid var(--border-s);border-radius:var(--rs);padding:13px;font-size:14px;cursor:pointer;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-weight:500;transition:background .15s;display:none}
.next-btn:active{background:var(--surface2)}

/* FINAL */
.final-wrap{padding:24px 0;text-align:center}
.outcome-banner{display:inline-block;background:var(--teal-l);border:1px solid var(--teal-b);border-radius:var(--r);padding:11px 22px;margin-bottom:20px}
.outcome-lbl{font-size:11px;color:var(--teal);font-weight:700;letter-spacing:.06em;font-family:'IBM Plex Mono',monospace}
.outcome-txt{font-size:13px;margin-top:3px}
.score-ring{width:110px;height:110px;margin:0 auto 12px;position:relative}
.score-ring svg{width:110px;height:110px;transform:rotate(-90deg)}
.score-ring circle{fill:none;stroke-width:7}
.score-track{stroke:var(--surface2)}
.score-fill{stroke:var(--teal);stroke-linecap:round;transition:stroke-dashoffset 1s ease}
.score-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:26px;font-weight:700;font-family:'IBM Plex Mono',monospace}
.score-denom{font-size:13px;color:var(--muted)}
.final-msg{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.7}
.action-btns{display:flex;flex-direction:column;gap:8px}
.btn-primary{background:var(--teal);color:#fff;border:none;border-radius:var(--rs);padding:13px;font-size:14px;font-weight:500;cursor:pointer;font-family:'Noto Sans JP',sans-serif;width:100%}
.btn-secondary{background:var(--surface);color:var(--text);border:1.5px solid var(--border-s);border-radius:var(--rs);padding:12px;font-size:13px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;width:100%}
.btn-review{background:var(--amber-l);color:var(--amber);border:1.5px solid var(--amber-b);border-radius:var(--rs);padding:12px;font-size:13px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;width:100%;font-weight:500}
textarea{width:100%;background:var(--surface);border:.5px solid var(--border);border-radius:var(--rs);padding:10px 12px;font-size:13px;color:var(--text);resize:none;min-height:80px;font-family:'Noto Sans JP',sans-serif;margin-bottom:7px;line-height:1.6;-webkit-appearance:none}
textarea:focus{outline:none;border-color:var(--border-s)}
.ai-resp{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:13px;margin-top:10px;font-size:13px;line-height:1.8;display:none}
.loading-dots{display:none;align-items:center;gap:8px;padding:12px 0;color:var(--muted);font-size:13px}
.loading-dots.show{display:flex}
.dot{width:5px;height:5px;background:var(--hint);border-radius:50%;animation:blink 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-5px);opacity:1}}

/* REVIEW */
#review{display:none;max-width:520px;margin:0 auto}
.review-header{background:linear-gradient(135deg,#005A62,#00818A);padding:20px 16px;color:#fff}
.review-header h2{font-size:18px;font-weight:700;margin-bottom:4px}
.review-header p{font-size:13px;opacity:.8}
.review-main{padding:16px 16px 48px}
.review-q-card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:12px}
.review-q-label{font-size:10px;font-weight:700;color:var(--teal);font-family:'IBM Plex Mono',monospace;margin-bottom:6px;letter-spacing:.06em}
.review-q-scenario{font-size:11px;color:var(--muted);margin-bottom:8px}
.review-q-title{font-size:13px;font-weight:500;margin-bottom:10px;line-height:1.6}
.review-status{display:inline-block;font-size:10px;font-family:'IBM Plex Mono',monospace;padding:2px 7px;border-radius:4px;margin-bottom:8px}
.review-status.wrong{background:var(--red-l);color:var(--red)}
.review-status.unsure{background:var(--amber-l);color:var(--amber)}
.review-q-clear{font-size:12px;color:var(--muted);text-decoration:underline;cursor:pointer;background:none;border:none;margin-top:8px;display:block}
.empty-review{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-review .emoji{font-size:40px;margin-bottom:12px}
</style>
</head>
<body>
<header class="app-header">
  <span class="tl-badge">鉄則</span>
  <span class="header-title" id="header-title">内科レジデントの鉄則 第4版</span>
  <span class="header-score" id="header-score"></span>
</header>
<div class="progress-wrap"><div class="progress-fill" id="progress"></div></div>

<!-- HOME -->
<div id="home">
  <div class="home-hero">
    <h1>内科レジデントの鉄則<br>問題集</h1>
    <span class="book-tag">第4版準拠｜全3編・39章対応</span>
    <p>症例ベースで「鉄則」を実践的に身につける<br>病棟当直・入院・病棟管理の全範囲を網羅</p>
  </div>
  <div class="home-tabs">
    <button class="tab-btn active" onclick="switchTab('all')">すべて</button>
    <button class="tab-btn" onclick="switchTab('p1')">当直編</button>
    <button class="tab-btn" onclick="switchTab('p2')">入院編</button>
    <button class="tab-btn" onclick="switchTab('p3')">管理編</button>
    <button class="tab-btn" onclick="switchTab('done')">完了</button>
  </div>
  <div class="progress-summary">
    <div class="prog-ring">
      <svg viewBox="0 0 54 54"><circle class="prog-track" cx="27" cy="27" r="22"/><circle class="prog-fill-c" id="home-ring" cx="27" cy="27" r="22" stroke-dasharray="138.2" stroke-dashoffset="138.2"/></svg>
      <div class="prog-num" id="home-prog-num">0/30</div>
    </div>
    <div class="prog-text">
      <h3>学習進捗</h3>
      <p id="home-prog-text">まだシナリオを開始していません</p>
    </div>
  </div>
  <div class="review-banner" id="review-banner" onclick="goReview()" style="display:none">
    <div class="review-icon">📚</div>
    <div class="review-text">
      <h3>復習セット</h3>
      <p>間違えた・自信がなかった問題</p>
    </div>
    <span class="review-count" id="review-count">0問</span>
  </div>
  <div class="section-head" id="list-label">全シナリオ — 病棟当直編 / 入院編 / 病棟管理編</div>
  <div class="scenario-list" id="scenario-list"></div>
</div>

<!-- SIM -->
<div id="sim">
  <div class="sim-main" id="sim-main"></div>
</div>

<!-- REVIEW -->
<div id="review">
  <div class="review-header">
    <h2>📚 復習セット</h2>
    <p id="review-subtitle">間違えた・自信がなかった問題をもう一度解きましょう</p>
  </div>
  <div class="review-main" id="review-main"></div>
</div>

<script>
// ============================================================
// SCENARIO DATA — 内科レジデントの鉄則 第4版 準拠
// Part I: 病棟当直編 (ch1-13), Part II: 入院編 (ch14-29), Part III: 病棟管理編 (ch30-39)
// ============================================================
const SC = [
// ================================================================
// I. 病棟当直編
// ================================================================
{id:'fever',ph:1,icon:'🌡️',title:'発熱',sub:'Ch.1 全身状態に注意しつつ，全身の所見を取る！',diff:1,
outcome:'鉄則を実践して見逃しゼロへ',
steps:[
{t:'case',title:'症例：糖尿病の既往がある80歳女性',
con:'来院3日前から排尿時痛があったが，膀胱炎と考えて様子を見ていた．本日息子から普段と様子が違うことを指摘され，体温38.7°C，来院した．バイタル：意識レベルJCS I-2，体温38.7°C，血圧120/60 mmHg，脈拍110/分，呼吸数26/分，SpO₂96%（室内気）．CRTは4秒',
note:'鉄則①：発熱患者をみたら，まずは敗血症でないかqSOFAを評価'},
{t:'single',title:'Q1. バイタルをみて最初に行うべき評価は？',
ch:[{l:'A',x:'まず血液培養を提出してから評価する'},{l:'B',x:'qSOFAスコアで敗血症のリスクを評価する（呼吸数・意識・血圧の3項目）'},{l:'C',x:'尿路感染症の抗菌薬を選択する'},{l:'D',x:'体温が38.7°Cなので解熱薬を先に投与する'}],
cor:'B',

{id:'hypoxia',ph:1,icon:'🫁',title:'酸素飽和度低下',sub:'Ch.3 低酸素の原因を迅速に同定し，正しい酸素投与を！',diff:2,

steps:[

{t:'single',title:'Q1. まず行うべきことは？',
ch:[{l:'A',x:'胸部X線を撮影してから酸素投与を始める'},{l:'B',x:'酸素投与を開始しながら原因を検索する（ABCDEアプローチ）'},{l:'C',x:'挿管の準備をしてから酸素を投与する'},{l:'D',x:'血液ガスの結果を待ってから対応を決める'}],

{t:'multi',title:'Q2. SpO₂が上がらない場合に検討すべき原因は？（複数選択）',
ch:[{l:'A',x:'緊張性気胸（呼吸音消失・気管偏位・頸静脈怒張）'},{l:'B',x:'大量胸水（一側の呼吸音低下・打診で濁音）'},{l:'C',x:'肺塞栓（突然発症・D-dimer上昇・下腿腫脹）'},{l:'D',x:'鼻汁による鼻閉（点鼻薬で改善する）'}],

{t:'single',title:'Q3. COPD患者に高流量酸素を投与した場合のリスクは？',
ch:[{l:'A',x:'特にリスクなし。SpO₂は100%に保つべき'},{l:'B',x:'CO₂ナルコーシス（高CO₂血症・意識低下）を起こす可能性がある'},{l:'C',x:'低血糖を起こすリスクがある'},{l:'D',x:'高流量酸素は必ず肺水腫を起こす'}],

]},

{id:'arrhythmia',ph:1,icon:'❤️',title:'徐脈・頻脈',sub:'Ch.5 緊急性の判断とモニタリング，確実な対応を！',diff:3,

]},

note:'胸痛で絶対に見逃せない5疾患：①ACS（急性冠症候群）②大動脈解離③肺塞栓④緊張性気胸⑤食道破裂'},
{t:'single',title:'Q1. この症例で最も疑うべき疾患は？',
ch:[{l:'A',x:'急性冠症候群（STEMI）'},{l:'B',x:'急性肺塞栓症（PE）'},{l:'C',x:'胃食道逆流症（GERD）'},{l:'D',x:'肋間神経痛'}],
cor:'B',
fb:{correct:'正解！術後・右下腿腫脹（DVT）＋突然の呼吸困難＋低SpO₂＋低血圧→急性肺塞栓症を強く疑う。PEのWells scoreを計算（DVT症状・HR>100・術後臥床・DVT/PE既往・他疾患の可能性低い・喀血・癌）。高リスクなら即CTPA。循環動態不安定→血栓溶解（tPA 100mg/2時間）。',wrong:'正解はB。術後＋DVT所見＋急性の呼吸困難＋低血圧はPEの典型像。'}},
{t:'multi',title:'Q2. 胸痛患者への初期対応として正しいのは？（複数選択）',
ch:[{l:'A',x:'12誘導心電図（到着10分以内）'},{l:'B',x:'モニター・ルート確保・酸素投与'},{l:'C',x:'胸部X線（縦隔拡大→大動脈解離，浸潤影→肺炎）'},{l:'D',x:'まず内科医が来てから全ての検査を指示する'}],
cor:['A','B','C'],
fb:{correct:'正解！胸痛の初期対応はABC＋12誘導ECG（10分以内）＋胸部X線の同時進行。D（全ての検査を後回し）は手遅れになる。心電図でSTEMI確認→カテ室起動，大動脈解離疑い→造影CT，PE疑い→CTPA，気胸→胸部X線・胸腔ドレナージ。',partial:'A・B・Cが正解。D（後回し）では心停止・致死的疾患を見逃す危険があります。',wrong:'A・B・Cが正解。Dのような「待機してから検査」は胸痛診療では危険。'}},
{t:'single',title:'Q3. 「大動脈解離」と「ACS」を鑑別するために特に重要な所見は？',
ch:[{l:'A',x:'左右上肢の血圧差（>20mmHg）と胸背部への移動痛'},{l:'B',x:'トロポニンの上昇'},{l:'C',x:'心電図のST変化'},{l:'D',x:'年齢（高齢者はACSが多い）'}],
cor:'A',
fb:{correct:'正解！大動脈解離の鑑別に重要：①「引き裂かれるような」突発性の最大痛②背部・腰部への移動痛③左右上肢の血圧差（>20mmHg）④脈拍の左右差。トロポニン・ST変化はACSでも大動脈解離（冠動脈に解離が及ぶと）でも上昇しうるため鑑別にはならない。大動脈解離疑いにtPAは禁忌。',wrong:'正解はA。大動脈解離の鑑別で最重要なのは移動痛と左右血圧差。'}}
]},
{id:'abdominal_pain_ward',ph:1,icon:'🩺',title:'腹痛（病棟当直）',sub:'Ch.7 生命に危険を及ぼす疾患を除外せよ！',diff:2,

{t:'single',title:'Q3. 腸閉塞の症状として正しいのは？',

]},
{id:'headache_ward',ph:1,icon:'💢',title:'頭痛（病棟当直）',sub:'Ch.8 くも膜下出血を絶対に見逃すな！',diff:2,

ch:[{l:'A',x:'セフトリアキソン（CTRX）：第3世代セフェム'},{l:'B',x:'ピペラシリン/タゾバクタム（TAZ/PIPC）：βラクタマーゼ阻害薬配合'},{l:'C',x:'メロペネム（カルバペネム）：ESBLに最も確実に有効'},{l:'D',x:'アモキシシリン（ペニシリン系）'}],

// ============================================================
// STATE & STORAGE
// ============================================================
const STORE_KEY = 'naika_tessoku_state';
function loadState(){try{return JSON.parse(localStorage.getItem(STORE_KEY)||'{}')}catch(e){return {}}}
function saveState(s){try{localStorage.setItem(STORE_KEY,JSON.stringify(s))}catch(e){}}
let appState=loadState();
if(!appState.completed)appState.completed={};
if(!appState.wrongQ)appState.wrongQ=[];
if(!appState.unsureQ)appState.unsureQ=[];
let curSc=null,curStep=0,curMultiSel=[],curTotalScore=0,curMaxScore=0;
let curTab='all';

// ============================================================
// HOME
// ============================================================
function renderHome(){
  document.getElementById('sim').style.display='none';
  document.getElementById('review').style.display='none';
  document.getElementById('home').style.display='block';
  document.getElementById('header-title').textContent='内科レジデントの鉄則 第4版';
  document.getElementById('header-score').textContent='';
  document.getElementById('progress').style.width='0%';

  const done=Object.keys(appState.completed).length;
  const total=SC.length;
  document.getElementById('home-prog-num').textContent=done+'/'+total;
  document.getElementById('home-prog-text').textContent=
    done===0?'まだシナリオを開始していません':
    done===total?'🎉 全シナリオ完了！おめでとうございます！':
    done+'件完了 — 残り'+(total-done)+'件';
  const circ=138.2;
  document.getElementById('home-ring').style.strokeDashoffset=circ-(done/total)*circ;

  const reviewItems=dedupeReviewItems([...appState.wrongQ,...appState.unsureQ]);
  const rb=document.getElementById('review-banner');
  if(reviewItems.length>0){rb.style.display='flex';document.getElementById('review-count').textContent=reviewItems.length+'問';}
  else rb.style.display='none';

  renderScenarioList();
}

function switchTab(tab){
  curTab=tab;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{b.classList.toggle('active',['all','p1','p2','p3','done'][i]===tab)});
  const lm={all:'全シナリオ — 病棟当直編 / 入院編 / 病棟管理編',p1:'I. 病棟当直編 — Ch.1〜13',p2:'II. 入院編 — Ch.14〜29',p3:'III. 病棟管理編 — Ch.30〜39',done:'完了済みシナリオ'};
  document.getElementById('list-label').textContent=lm[tab];
  renderScenarioList();
}

function renderScenarioList(){
  const list=document.getElementById('scenario-list');
  list.innerHTML='';
  const filtered=SC.filter(sc=>{
    if(curTab==='p1')return sc.ph===1;
    if(curTab==='p2')return sc.ph===2;
    if(curTab==='p3')return sc.ph===3;
    if(curTab==='done')return appState.completed[sc.id];
    return true;
  });
  if(filtered.length===0){list.innerHTML='<div style="text-align:center;padding:30px;color:var(--muted);font-size:14px">該当するシナリオがありません</div>';return;}

  let lastPh=0;
  filtered.forEach(sc=>{
    if(curTab==='all'&&sc.ph!==lastPh){
      const div=document.createElement('div');
      div.className='part-divider';
      div.textContent={1:'I. 病棟当直編',2:'II. 入院編',3:'III. 病棟管理編'}[sc.ph];
      list.appendChild(div);
      lastPh=sc.ph;
    }
    const isDone=!!appState.completed[sc.id];
    const hasReview=appState.wrongQ.some(q=>q.scId===sc.id)||appState.unsureQ.some(q=>q.scId===sc.id);
    const diffLabel=['','入門','標準','応用'][sc.diff];
    const diffClass=['','diff-1','diff-2','diff-3'][sc.diff];
    const btn=document.createElement('button');
    btn.className='scenario-card'+(isDone?' done':hasReview?' has-review':'');
    btn.innerHTML=`<div class="sc-icon">${sc.icon}</div>
      <div class="sc-body">
        <div class="sc-title">${sc.title}</div>
        <div class="sc-meta">${sc.sub}</div>
        <div class="sc-tags">
          <span class="sc-badge ${diffClass}">${diffLabel}</span>
          ${hasReview?'<span class="sc-badge" style="background:var(--amber-l);color:var(--amber)">復習あり</span>':''}
          ${isDone?'<span class="sc-badge" style="background:#A8DFDE;color:#004A50">完了</span>':''}
        </div>
      </div>
      <span class="sc-arrow">${isDone?'✓':'›'}</span>`;
    btn.onclick=()=>startScenario(sc.id);
    list.appendChild(btn);
  });
}

// ============================================================
// SIMULATION
// ============================================================
function startScenario(id){
  curSc=SC.find(s=>s.id===id);
  curStep=0;curMultiSel=[];curTotalScore=0;curMaxScore=0;
  document.getElementById('home').style.display='none';
  document.getElementById('review').style.display='none';
  document.getElementById('sim').style.display='block';
  document.getElementById('header-title').textContent=curSc.title;
  document.getElementById('header-score').textContent='';
  document.getElementById('progress').style.width='5%';
  renderStep(0);
}

function renderStep(idx){
  const sc=curSc;
  if(idx>=sc.steps.length){renderFinal();return;}
  const step=sc.steps[idx];
  const main=document.getElementById('sim-main');
  main.innerHTML='';
  const div=document.createElement('div');
  div.className='screen active';

  const total=sc.steps.length;
  let dots='';
  for(let i=0;i<total;i++){
    let cls=i<idx?'done':i===idx?'cur':'';
    dots+=`<div class="step-dot ${cls}"></div>`;
  }
  div.innerHTML=`<div class="step-indicator">${dots}<span class="step-lbl">STEP ${idx+1}/${total}</span></div>`;

  if(step.t==='case'){
    div.innerHTML+=buildCaseHTML(step);
    const nb=document.createElement('button');
    nb.className='next-btn';nb.style.display='block';
    nb.textContent='問題に進む →';
    nb.onclick=()=>{curStep++;renderStep(curStep);};
    div.appendChild(nb);
  } else if(step.t==='multi'){
    div.innerHTML+=buildMultiHTML(step,idx);
    div.querySelector('#next-'+idx).onclick=()=>{curStep++;renderStep(curStep);};
    curMultiSel=[];
  } else if(step.t==='single'){
    div.innerHTML+=buildSingleHTML(step,idx);
    div.querySelector('#next-'+idx).onclick=()=>{curStep++;renderStep(curStep);};
  }

  main.appendChild(div);
  const pct=(idx/total)*90+5;
  document.getElementById('progress').style.width=pct+'%';
  window.scrollTo({top:0,behavior:'smooth'});
}

function buildCaseHTML(step){
  const lines=step.con.split('\n').map(l=>`<div>${l}</div>`).join('');
  const note=step.note?`<div class="tessoku-box">${step.note}</div>`:'';
  return `<div class="case-card"><div class="case-hd"><div><div class="case-title">${step.title}</div></div></div><div class="case-body">${lines}</div></div>${note}`;
}

function buildMultiHTML(step,idx){
  return `<div class="sec-lbl">${step.title}</div>
    <p class="multi-hint">※正しいと思うものを全て選択してください</p>
    <div class="choices" id="choices-${idx}">${step.ch.map(c=>`<button class="choice-btn" data-l="${c.l}" onclick="toggleMulti(this)"><span class="choice-letter">${c.l}</span><span>${c.x}</span></button>`).join('')}</div>
    <button class="submit-btn" id="submit-${idx}" onclick="checkMulti(${idx})">回答する</button>
    <div class="feedback" id="fb-${idx}"></div>
    <button class="unsure-btn" id="unsure-${idx}" onclick="toggleUnsure(${idx})">🤔 自信がなかった問題としてマーク</button>
    <button class="next-btn" id="next-${idx}">次へ →</button>`;
}

function buildSingleHTML(step,idx){
  return `<div class="sec-lbl">${step.title}</div>
    <div class="choices" id="choices-${idx}">${step.ch.map(c=>`<button class="choice-btn" data-l="${c.l}" onclick="selectSingle(this,${idx})"><span class="choice-letter">${c.l}</span><span>${c.x}</span></button>`).join('')}</div>
    <div class="feedback" id="fb-${idx}"></div>
    <button class="unsure-btn" id="unsure-${idx}" onclick="toggleUnsure(${idx})">🤔 自信がなかった問題としてマーク</button>
    <button class="next-btn" id="next-${idx}">次へ →</button>`;
}

function toggleMulti(btn){
  if(btn.disabled)return;
  const l=btn.dataset.l;
  const i=curMultiSel.indexOf(l);
  if(i>-1){curMultiSel.splice(i,1);btn.classList.remove('sel');}
  else{curMultiSel.push(l);btn.classList.add('sel');}
}

function checkMulti(stepIdx){
  if(curMultiSel.length===0)return;
  const step=curSc.steps[stepIdx];
  const cor=step.cor;const sel=curMultiSel;
  document.querySelectorAll(`#choices-${stepIdx} .choice-btn`).forEach(b=>b.disabled=true);
  document.getElementById('submit-'+stepIdx).disabled=true;
  document.querySelectorAll(`#choices-${stepIdx} .choice-btn`).forEach(b=>{
    const l=b.dataset.l;
    if(cor.includes(l)&&sel.includes(l))b.className='choice-btn correct';
    else if(!cor.includes(l)&&sel.includes(l))b.className='choice-btn wrong';
    else if(cor.includes(l))b.className='choice-btn reveal';
    else b.className='choice-btn';
  });
  const allOk=cor.every(c=>sel.includes(c))&&sel.every(s=>cor.includes(s));
  const partial=cor.some(c=>sel.includes(c))&&sel.every(s=>cor.includes(s));
  const type=allOk?'correct':partial?'partial':'wrong';
  if(allOk)curTotalScore++;curMaxScore++;
  showFeedback(stepIdx,type,step.fb[type]||step.fb.wrong);
  document.getElementById('next-'+stepIdx).style.display='block';
  document.getElementById('unsure-'+stepIdx).style.display='block';
  if(!allOk)addWrongQ(stepIdx,step.title);
  updateScore();
}

function selectSingle(btn,stepIdx){
  if(btn.disabled)return;
  const step=curSc.steps[stepIdx];
  const val=btn.dataset.l;
  document.querySelectorAll(`#choices-${stepIdx} .choice-btn`).forEach(b=>b.disabled=true);
  const ok=val===step.cor;
  btn.className='choice-btn '+(ok?'correct':'wrong');
  if(!ok)document.querySelectorAll(`#choices-${stepIdx} .choice-btn`).forEach(b=>{if(b.dataset.l===step.cor)b.className='choice-btn reveal';});
  if(ok)curTotalScore++;curMaxScore++;
  showFeedback(stepIdx,ok?'correct':'wrong',step.fb[ok?'correct':'wrong']);
  document.getElementById('next-'+stepIdx).style.display='block';
  document.getElementById('unsure-'+stepIdx).style.display='block';
  if(!ok)addWrongQ(stepIdx,step.title);
  updateScore();
}

function showFeedback(idx,type,text){
  const fb=document.getElementById('fb-'+idx);
  fb.className='feedback '+type;
  const label={correct:'正解！',partial:'部分正解',wrong:'不正解'}[type];
  fb.innerHTML=`<span class="fb-badge">${label}</span><br>${text}`;
  fb.style.display='block';
}

function updateScore(){document.getElementById('header-score').textContent=curTotalScore+'/'+curMaxScore;}

function addWrongQ(stepIdx,title){
  const key=curSc.id+'_'+stepIdx;
  if(!appState.wrongQ.some(q=>q.key===key)){
    appState.wrongQ.push({key,scId:curSc.id,stepIdx,title:curSc.title+'：'+title});
    saveState(appState);
  }
}

function toggleUnsure(stepIdx){
  const btn=document.getElementById('unsure-'+stepIdx);
  const key=curSc.id+'_'+stepIdx;
  const exists=appState.unsureQ.findIndex(q=>q.key===key);
  const step=curSc.steps[stepIdx];
  if(exists>-1){
    appState.unsureQ.splice(exists,1);
    btn.classList.remove('active');btn.textContent='🤔 自信がなかった問題としてマーク';
  }else{
    appState.unsureQ.push({key,scId:curSc.id,stepIdx,title:curSc.title+'：'+step.title});
    btn.classList.add('active');btn.textContent='✅ 復習セットに追加しました';
  }
  saveState(appState);
}

// ============================================================
// FINAL
// ============================================================
function renderFinal(){
  const sc=curSc;
  document.getElementById('progress').style.width='100%';
  const pct=curMaxScore>0?curTotalScore/curMaxScore:0;
  const msgs=['解説をもう一度読み直して復習しましょう。「鉄則」の一言一句を繰り返し読むことが大切です。','惜しい判断がありました。鉄則のポイントを確認してください。','良い判断力です！もう少しで完璧です。','完璧です！この理解で現場でも鉄則を実践できます！'];
  const msgIdx=pct<0.4?0:pct<0.65?1:pct<0.9?2:3;
  const circ=283.0;const offset=circ-pct*circ;
  const main=document.getElementById('sim-main');
  main.innerHTML='';
  const div=document.createElement('div');
  div.className='screen active';
  div.innerHTML=`
    <div class="final-wrap">
      <div class="outcome-banner"><div class="outcome-lbl">CHAPTER COMPLETE</div><div class="outcome-txt">${sc.sub}</div></div>
      <div class="score-ring">
        <svg viewBox="0 0 100 100"><circle class="score-track" cx="50" cy="50" r="45"/><circle class="score-fill" id="sf" cx="50" cy="50" r="45" stroke-dasharray="${circ}" stroke-dashoffset="${circ}"/></svg>
        <div class="score-num">${curTotalScore}<span class="score-denom">/${curMaxScore}</span></div>
      </div>
      <div class="final-msg">${msgs[msgIdx]}</div>
      <div style="margin-bottom:16px">
        <p style="font-size:11px;color:var(--hint);margin-bottom:7px;font-family:'IBM Plex Mono',monospace">AI解説（任意）</p>
        <textarea id="ai-q" placeholder="この章の鉄則について，より詳しく知りたいことを質問してください（例：qSOFAと血液培養の関係は？ABGの代償計算の方法を教えて）"></textarea>
        <button class="submit-btn" id="ai-btn" onclick="askAI()">AIに質問する</button>
        <div class="loading-dots" id="ai-loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div><span style="margin-left:4px">解説を生成中...</span></div>
        <div class="ai-resp" id="ai-resp"><div class="card-lbl">AI解説</div><div id="ai-resp-text"></div></div>
      </div>
      <div class="action-btns">
        <button class="btn-primary" onclick="completeAndHome()">完了してホームへ戻る</button>
        <button class="btn-review" onclick="goReview()">📚 復習セットを見る</button>
        <button class="btn-secondary" onclick="startScenario('${sc.id}')">もう一度プレイ</button>
      </div>
    </div>`;
  main.appendChild(div);
  window.scrollTo({top:0,behavior:'smooth'});
  setTimeout(()=>{const el=document.getElementById('sf');if(el)el.style.strokeDashoffset=offset;},300);
}

function completeAndHome(){
  if(!appState.completed[curSc.id]){appState.completed[curSc.id]=true;saveState(appState);}
  renderHome();
}

async function askAI(){
  const q=document.getElementById('ai-q').value.trim();
  if(!q)return;
  document.getElementById('ai-btn').disabled=true;
  document.getElementById('ai-loading').classList.add('show');
  document.getElementById('ai-resp').style.display='none';
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',max_tokens:1000,
        system:'あなたは「内科レジデントの鉄則 第4版」（聖路加国際病院研修医著）をよく知る指導医です。初期研修医からの質問に対して，本書の「鉄則」の内容に沿いながら，実践的で現場で使える具体的な回答をしてください。薬剤量・投与方法・判断の根拠を含めて300〜400字で回答してください。現在取り組んでいる章：' + curSc.title + '（' + curSc.sub + '）',
        messages:[{role:'user',content:q}]
      })
    });
    const data=await res.json();
    const text=(data.content||[]).map(i=>i.text||'').join('')||'エラーが発生しました。';
    document.getElementById('ai-resp-text').textContent=text;
    document.getElementById('ai-resp').style.display='block';
  }catch(e){
    document.getElementById('ai-resp-text').textContent='API接続エラーが発生しました。';
    document.getElementById('ai-resp').style.display='block';
  }
  document.getElementById('ai-loading').classList.remove('show');
  document.getElementById('ai-btn').disabled=false;
}

// ============================================================
// REVIEW
// ============================================================
function dedupeReviewItems(items){
  const seen=new Set();
  return items.filter(q=>{if(seen.has(q.key))return false;seen.add(q.key);return true;});
}

function goReview(){
  const items=dedupeReviewItems([...appState.wrongQ,...appState.unsureQ]);
  document.getElementById('home').style.display='none';
  document.getElementById('sim').style.display='none';
  document.getElementById('review').style.display='block';
  document.getElementById('header-title').textContent='復習セット';
  document.getElementById('header-score').textContent=items.length+'問';
  document.getElementById('progress').style.width='100%';
  document.getElementById('review-subtitle').textContent=items.length+'問の復習問題があります';

  const main=document.getElementById('review-main');
  main.innerHTML='';

  if(items.length===0){
    main.innerHTML=`<div class="empty-review"><div class="emoji">✨</div><p>復習セットに問題がありません。<br>シナリオをプレイして，間違えた問題や<br>自信がなかった問題を追加しましょう。</p></div>
      <button class="btn-primary" onclick="renderHome()" style="width:100%;margin-top:20px">ホームへ戻る</button>`;
    return;
  }

  const backBtn=document.createElement('button');
  backBtn.className='btn-secondary';
  backBtn.style.cssText='width:100%;margin-bottom:12px';
  backBtn.textContent='← ホームへ戻る';
  backBtn.onclick=renderHome;
  main.appendChild(backBtn);

  const clearBtn=document.createElement('button');
  clearBtn.className='btn-secondary';
  clearBtn.style.cssText='width:100%;margin-bottom:20px;font-size:12px';
  clearBtn.textContent='🗑 復習セットをすべてクリア';
  clearBtn.onclick=()=>{if(confirm('復習セットをすべてクリアしますか？')){appState.wrongQ=[];appState.unsureQ=[];saveState(appState);goReview();}};
  main.appendChild(clearBtn);

  items.forEach((item,i)=>{
    const sc=SC.find(s=>s.id===item.scId);
    if(!sc)return;
    const step=sc.steps[item.stepIdx];
    if(!step||step.t==='case')return;
    const isWrong=appState.wrongQ.some(q=>q.key===item.key);
    const isUnsure=appState.unsureQ.some(q=>q.key===item.key);
    const card=document.createElement('div');
    card.className='review-q-card';
    card.id='review-card-'+item.key;
    const statusBadges=[];
    if(isWrong)statusBadges.push('<span class="review-status wrong">不正解</span>');
    if(isUnsure)statusBadges.push('<span class="review-status unsure">自信なし</span>');
    card.innerHTML=`
      <div class="review-q-label">Q${i+1} / ${items.length}</div>
      <div class="review-q-scenario">${sc.icon} ${sc.title}</div>
      ${statusBadges.join(' ')}
      <div class="review-q-title">${step.title}</div>
      <div class="choices" id="rv-choices-${item.key}">
        ${step.ch.map(c=>`<button class="choice-btn" data-l="${c.l}" onclick="rvSelect(this,'${item.key}','${step.t}')"><span class="choice-letter">${c.l}</span><span>${c.x}</span></button>`).join('')}
      </div>
      ${step.t==='multi'?`<button class="submit-btn" id="rv-submit-${item.key}" onclick="rvCheckMulti('${item.key}')">回答する</button>`:''}
      <div class="feedback" id="rv-fb-${item.key}"></div>
      <button class="review-q-clear" onclick="removeFromReview('${item.key}')">✓ この問題を復習セットから削除する</button>`;
    if(step.t==='multi')card._multiSel=[];
    main.appendChild(card);
  });

  const replayBtn=document.createElement('button');
  replayBtn.className='btn-primary';
  replayBtn.style.cssText='width:100%;margin-top:20px';
  replayBtn.textContent='ホームへ戻る';
  replayBtn.onclick=renderHome;
  main.appendChild(replayBtn);
}

function rvSelect(btn,key,type){
  if(btn.disabled)return;
  const item=[...appState.wrongQ,...appState.unsureQ].find(q=>q.key===key);
  if(!item)return;
  const sc=SC.find(s=>s.id===item.scId);
  const step=sc.steps[item.stepIdx];
  if(type==='multi'){
    const card=document.getElementById('review-card-'+key);
    if(!card._multiSel)card._multiSel=[];
    const l=btn.dataset.l;
    const idx=card._multiSel.indexOf(l);
    if(idx>-1){card._multiSel.splice(idx,1);btn.classList.remove('sel');}
    else{card._multiSel.push(l);btn.classList.add('sel');}
  }else{
    document.querySelectorAll(`#rv-choices-${key} .choice-btn`).forEach(b=>b.disabled=true);
    const ok=btn.dataset.l===step.cor;
    btn.className='choice-btn '+(ok?'correct':'wrong');
    if(!ok)document.querySelectorAll(`#rv-choices-${key} .choice-btn`).forEach(b=>{if(b.dataset.l===step.cor)b.className='choice-btn reveal';});
    const fb=document.getElementById('rv-fb-'+key);
    fb.className='feedback '+(ok?'correct':'wrong');
    fb.innerHTML=`<span class="fb-badge">${ok?'正解！':'不正解'}</span><br>${step.fb[ok?'correct':'wrong']}`;
    fb.style.display='block';
    if(ok)removeFromReviewSilent(key);
  }
}

function rvCheckMulti(key){
  const item=[...appState.wrongQ,...appState.unsureQ].find(q=>q.key===key);
  if(!item)return;
  const sc=SC.find(s=>s.id===item.scId);
  const step=sc.steps[item.stepIdx];
  const card=document.getElementById('review-card-'+key);
  const sel=card._multiSel||[];
  if(sel.length===0)return;
  document.querySelectorAll(`#rv-choices-${key} .choice-btn`).forEach(b=>b.disabled=true);
  document.getElementById('rv-submit-'+key).disabled=true;
  const cor=step.cor;
  document.querySelectorAll(`#rv-choices-${key} .choice-btn`).forEach(b=>{
    const l=b.dataset.l;
    if(cor.includes(l)&&sel.includes(l))b.className='choice-btn correct';
    else if(!cor.includes(l)&&sel.includes(l))b.className='choice-btn wrong';
    else if(cor.includes(l))b.className='choice-btn reveal';
    else b.className='choice-btn';
  });
  const allOk=cor.every(c=>sel.includes(c))&&sel.every(s=>cor.includes(s));
  const partial=cor.some(c=>sel.includes(c))&&sel.every(s=>cor.includes(s));
  const type=allOk?'correct':partial?'partial':'wrong';
  const fb=document.getElementById('rv-fb-'+key);
  fb.className='feedback '+type;
  const label={correct:'正解！',partial:'部分正解',wrong:'不正解'}[type];
  fb.innerHTML=`<span class="fb-badge">${label}</span><br>${step.fb[type]||step.fb.wrong}`;
  fb.style.display='block';
  if(allOk)removeFromReviewSilent(key);
}

function removeFromReview(key){
  removeFromReviewSilent(key);
  const card=document.getElementById('review-card-'+key);
  if(card){card.style.opacity='0.4';card.style.pointerEvents='none';}
  document.getElementById('header-score').textContent=dedupeReviewItems([...appState.wrongQ,...appState.unsureQ]).length+'問';
}

function removeFromReviewSilent(key){
  appState.wrongQ=appState.wrongQ.filter(q=>q.key!==key);
  appState.unsureQ=appState.unsureQ.filter(q=>q.key!==key);
  saveState(appState);
}

renderHome();
</script>
